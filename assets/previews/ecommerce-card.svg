<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="ebg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c1d"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="eaccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#ebg)"/>

  <!-- Header -->
  <rect x="40" y="20" width="100" height="25" rx="5" fill="url(#eaccent)"/>
  <rect x="500" y="25" width="60" height="12" rx="4" fill="#444"/>
  <rect x="580" y="25" width="60" height="12" rx="4" fill="#444"/>
  <rect x="660" y="25" width="60" height="12" rx="4" fill="#444"/>
  <rect x="735" y="18" width="40" height="28" rx="8" fill="#1e1e3f"/>
  <circle cx="755" cy="32" r="8" fill="url(#eaccent)"/>

  <!-- Title -->
  <rect x="280" y="70" width="240" height="25" rx="5" fill="#fff"/>
  <rect x="300" y="105" width="200" height="12" rx="4" fill="#555"/>

  <!-- Product Cards with 3D effect -->
  <!-- Card 1 -->
  <g transform="rotate(-5 200 280)">
    <rect x="60" y="160" width="220" height="280" rx="20" fill="#1e1e3f"/>
    <rect x="80" y="180" width="180" height="140" rx="15" fill="url(#card1)"/>
    <ellipse cx="170" cy="250" rx="40" ry="30" fill="#fff" opacity="0.2"/>
    <rect x="80" y="340" width="120" height="15" rx="4" fill="#fff"/>
    <rect x="80" y="365" width="80" height="10" rx="3" fill="#888"/>
    <rect x="80" y="395" width="60" height="20" rx="5" fill="url(#eaccent)"/>
    <circle cx="230" cy="405" r="18" fill="#2a2a4a" stroke="#667eea" stroke-width="2"/>
  </g>

  <!-- Card 2 (center, larger) -->
  <rect x="290" y="140" width="240" height="300" rx="20" fill="#1e1e3f" stroke="url(#card2)" stroke-width="2"/>
  <rect x="310" y="160" width="200" height="160" rx="15" fill="url(#card2)"/>
  <ellipse cx="410" cy="240" rx="50" ry="35" fill="#fff" opacity="0.2"/>
  <rect x="310" y="340" width="150" height="18" rx="4" fill="#fff"/>
  <rect x="310" y="368" width="100" height="12" rx="3" fill="#888"/>
  <rect x="310" y="400" width="80" height="25" rx="6" fill="url(#eaccent)"/>
  <circle cx="500" cy="412" r="20" fill="#2a2a4a" stroke="url(#card2)" stroke-width="2"/>
  <text x="495" y="418" fill="#fff" font-size="16">+</text>

  <!-- Card 3 -->
  <g transform="rotate(5 600 280)">
    <rect x="540" y="160" width="220" height="280" rx="20" fill="#1e1e3f"/>
    <rect x="560" y="180" width="180" height="140" rx="15" fill="url(#card3)"/>
    <ellipse cx="650" cy="250" rx="40" ry="30" fill="#fff" opacity="0.2"/>
    <rect x="560" y="340" width="120" height="15" rx="4" fill="#fff"/>
    <rect x="560" y="365" width="80" height="10" rx="3" fill="#888"/>
    <rect x="560" y="395" width="60" height="20" rx="5" fill="url(#eaccent)"/>
    <circle cx="710" cy="405" r="18" fill="#2a2a4a" stroke="#4facfe" stroke-width="2"/>
  </g>

  <!-- Floating elements -->
  <circle cx="100" cy="100" r="30" fill="url(#card1)" opacity="0.2"/>
  <circle cx="700" cy="80" r="40" fill="url(#card2)" opacity="0.15"/>
  <circle cx="400" cy="480" r="50" fill="url(#card3)" opacity="0.1"/>

  <!-- Stars/sparkles -->
  <circle cx="150" cy="450" r="3" fill="#fff"/>
  <circle cx="650" cy="130" r="2" fill="#fff"/>
  <circle cx="50" cy="300" r="2" fill="#fff"/>
  <circle cx="750" cy="350" r="3" fill="#fff"/>
</svg>
