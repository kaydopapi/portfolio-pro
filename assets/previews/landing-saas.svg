<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Nav -->
  <rect x="40" y="20" width="80" height="25" rx="5" fill="url(#accent)"/>
  <rect x="550" y="25" width="50" height="12" rx="4" fill="#333"/>
  <rect x="620" y="25" width="50" height="12" rx="4" fill="#333"/>
  <rect x="690" y="20" width="70" height="25" rx="8" fill="url(#accent)"/>

  <!-- Hero -->
  <rect x="60" y="100" width="350" height="30" rx="6" fill="#fff"/>
  <rect x="60" y="145" width="280" height="15" rx="4" fill="#555"/>
  <rect x="60" y="170" width="320" height="15" rx="4" fill="#555"/>
  <rect x="60" y="210" width="140" height="45" rx="10" fill="url(#accent)"/>
  <rect x="220" y="210" width="140" height="45" rx="10" fill="none" stroke="#00f5ff" stroke-width="2"/>

  <!-- Dashboard Preview -->
  <rect x="450" y="80" width="300" height="200" rx="15" fill="#12121a" stroke="#333" stroke-width="1"/>
  <rect x="465" y="100" width="80" height="10" rx="3" fill="#444"/>
  <rect x="465" y="125" width="270" height="60" rx="8" fill="#1e1e2e"/>
  <rect x="480" y="140" width="100" height="30" rx="5" fill="url(#accent)" opacity="0.3"/>
  <rect x="600" y="140" width="60" height="30" rx="5" fill="#7b2fff" opacity="0.3"/>
  <rect x="465" y="200" width="130" height="60" rx="8" fill="#1e1e2e"/>
  <rect x="610" y="200" width="125" height="60" rx="8" fill="#1e1e2e"/>

  <!-- Pricing Cards -->
  <rect x="60" y="320" width="200" height="150" rx="15" fill="#12121a" stroke="#333"/>
  <rect x="80" y="345" width="60" height="12" rx="4" fill="#555"/>
  <rect x="80" y="370" width="100" height="25" rx="5" fill="url(#accent)"/>
  <rect x="80" y="410" width="140" height="8" rx="3" fill="#333"/>
  <rect x="80" y="425" width="120" height="8" rx="3" fill="#333"/>
  <rect x="80" y="440" width="100" height="8" rx="3" fill="#333"/>

  <rect x="280" y="310" width="220" height="170" rx="15" fill="#12121a" stroke="url(#accent)" stroke-width="2"/>
  <rect x="300" y="335" width="80" height="12" rx="4" fill="#00f5ff"/>
  <rect x="300" y="360" width="120" height="30" rx="5" fill="url(#accent)"/>
  <rect x="300" y="405" width="160" height="8" rx="3" fill="#333"/>
  <rect x="300" y="420" width="140" height="8" rx="3" fill="#333"/>
  <rect x="300" y="435" width="120" height="8" rx="3" fill="#333"/>
  <rect x="300" y="450" width="100" height="8" rx="3" fill="#333"/>

  <rect x="520" y="320" width="200" height="150" rx="15" fill="#12121a" stroke="#333"/>
  <rect x="540" y="345" width="60" height="12" rx="4" fill="#555"/>
  <rect x="540" y="370" width="100" height="25" rx="5" fill="#7b2fff"/>
  <rect x="540" y="410" width="140" height="8" rx="3" fill="#333"/>
  <rect x="540" y="425" width="120" height="8" rx="3" fill="#333"/>
  <rect x="540" y="440" width="100" height="8" rx="3" fill="#333"/>

  <!-- Decorative circles -->
  <circle cx="700" cy="100" r="80" fill="url(#accent)" opacity="0.1"/>
  <circle cx="100" cy="400" r="60" fill="#7b2fff" opacity="0.1"/>
</svg>
