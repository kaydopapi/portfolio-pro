<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="cbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="30%" style="stop-color:#feca57"/>
      <stop offset="60%" style="stop-color:#ff9ff3"/>
      <stop offset="100%" style="stop-color:#5f27cd"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
    <linearGradient id="neon2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2faf"/>
      <stop offset="100%" style="stop-color:#00f5ff"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#cbg)"/>

  <!-- Stars -->
  <circle cx="50" cy="50" r="2" fill="#fff"/>
  <circle cx="150" cy="80" r="1" fill="#fff"/>
  <circle cx="250" cy="40" r="2" fill="#fff"/>
  <circle cx="350" cy="90" r="1" fill="#fff"/>
  <circle cx="450" cy="30" r="2" fill="#fff"/>
  <circle cx="550" cy="70" r="1" fill="#fff"/>
  <circle cx="650" cy="50" r="2" fill="#fff"/>
  <circle cx="750" cy="85" r="1" fill="#fff"/>
  <circle cx="100" cy="120" r="1" fill="#fff"/>
  <circle cx="700" cy="110" r="2" fill="#fff"/>

  <!-- Sun/Moon -->
  <circle cx="400" cy="180" r="80" fill="url(#sunset)"/>
  <circle cx="400" cy="180" r="60" fill="#feca57" opacity="0.5"/>

  <!-- Mountains -->
  <polygon points="0,500 150,280 300,500" fill="#1a0533"/>
  <polygon points="200,500 400,220 600,500" fill="#2d0a4e"/>
  <polygon points="450,500 650,300 800,500" fill="#1a0533"/>

  <!-- Grid floor -->
  <line x1="0" y1="380" x2="800" y2="380" stroke="url(#neon1)" stroke-width="2"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="url(#neon1)" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="460" x2="800" y2="460" stroke="url(#neon1)" stroke-width="1" opacity="0.3"/>

  <!-- Vertical grid lines with perspective -->
  <line x1="400" y1="380" x2="400" y2="500" stroke="url(#neon1)" stroke-width="2"/>
  <line x1="300" y1="380" x2="200" y2="500" stroke="url(#neon1)" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="380" x2="600" y2="500" stroke="url(#neon1)" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="380" x2="0" y2="500" stroke="url(#neon1)" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="380" x2="800" y2="500" stroke="url(#neon1)" stroke-width="1" opacity="0.3"/>

  <!-- Neon palm tree left -->
  <rect x="80" y="280" width="8" height="100" fill="#0a0a15"/>
  <ellipse cx="60" cy="280" rx="40" ry="15" fill="none" stroke="url(#neon2)" stroke-width="3" transform="rotate(-30 60 280)"/>
  <ellipse cx="100" cy="275" rx="35" ry="12" fill="none" stroke="url(#neon2)" stroke-width="3" transform="rotate(20 100 275)"/>
  <ellipse cx="84" cy="265" rx="30" ry="10" fill="none" stroke="url(#neon2)" stroke-width="3" transform="rotate(-10 84 265)"/>

  <!-- Neon palm tree right -->
  <rect x="700" y="300" width="8" height="80" fill="#0a0a15"/>
  <ellipse cx="680" cy="300" rx="35" ry="12" fill="none" stroke="url(#neon2)" stroke-width="3" transform="rotate(-25 680 300)"/>
  <ellipse cx="720" cy="295" rx="30" ry="10" fill="none" stroke="url(#neon2)" stroke-width="3" transform="rotate(25 720 295)"/>
  <ellipse cx="704" cy="285" rx="25" ry="8" fill="none" stroke="url(#neon2)" stroke-width="3" transform="rotate(-5 704 285)"/>

  <!-- CSS text -->
  <text x="320" y="480" font-family="monospace" font-size="24" font-weight="bold" fill="url(#neon1)">PURE CSS</text>

  <!-- Reflection -->
  <rect x="0" y="380" width="800" height="120" fill="url(#sunset)" opacity="0.1"/>

  <!-- Scan lines effect -->
  <line x1="0" y1="390" x2="800" y2="390" stroke="#fff" stroke-width="1" opacity="0.03"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#fff" stroke-width="1" opacity="0.03"/>
  <line x1="0" y1="410" x2="800" y2="410" stroke="#fff" stroke-width="1" opacity="0.03"/>
</svg>
